<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenRealtors – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1a3a2a;
      --sage: #4a7c59;
      --mint: #a8d5b5;
      --cream: #f8f4ee;
      --warm: #e8ddd0;
      --gold: #c9a84c;
      --text: #1c1c1c;
      --muted: #6b7a6e;
      --error: #c0392b;
      --success: #27ae60;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm);
      color: var(--text);
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--forest);
      display: flex;
      flex-direction: column;
      padding: 36px 28px;
      z-index: 10;
    }

    .sidebar-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .sidebar-logo span { color: var(--mint); }

    .sidebar-sub {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      padding: 14px 16px;
      border-radius: 4px;
      margin-bottom: 36px;
    }

    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--sage);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 0.85rem;
    }

    .user-info span:first-child {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--cream);
    }

    .user-info span:last-child {
      font-size: 0.7rem;
      color: var(--mint);
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 4px;
      color: rgba(255,255,255,0.5);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: var(--sage); color: white; }

    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 4px;
      transition: all 0.2s;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover { background: rgba(192,57,43,0.15); color: #e88; }

    /* MAIN */
    .main {
      margin-left: 260px;
      min-height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      background: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(74,124,89,0.1);
      position: sticky; top: 0; z-index: 5;
    }

    .topbar h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--forest);
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .stat {
      text-align: right;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--sage);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* CONTENT */
    .content {
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 32px;
      align-items: start;
    }

    /* FORM PANEL */
    .form-panel {
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(26,58,42,0.06);
      position: sticky;
      top: 85px;
    }

    .panel-header {
      padding: 24px 28px;
      background: var(--forest);
    }

    .panel-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cream);
    }

    .panel-header p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .panel-body { padding: 28px; }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(74,124,89,0.2);
      border-radius: 3px;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(74,124,89,0.1);
      background: white;
    }

    .field textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #bbb; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
    }

    .submit-btn:hover { background: var(--forest); transform: translateY(-1px); }

    /* SUCCESS TOAST */
    .toast {
      position: fixed;
      top: 24px; right: 24px;
      background: var(--forest);
      color: var(--cream);
      padding: 16px 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      z-index: 999;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show { transform: translateX(0); }

    /* LISTINGS PANEL */
    .listings-panel {
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(26,58,42,0.06);
    }

    .listings-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .listings-panel .panel-header a {
      font-size: 0.75rem;
      color: var(--mint);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .listings-panel .panel-header a:hover { opacity: 1; }

    .property-list { padding: 16px; }

    .admin-card {
      display: flex;
      align-items: stretch;
      border: 1.5px solid rgba(74,124,89,0.12);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: cardIn 0.3s ease-out forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .admin-card:hover {
      border-color: rgba(74,124,89,0.3);
      box-shadow: 0 4px 16px rgba(26,58,42,0.07);
    }

    .card-accent {
      width: 5px;
      background: var(--sage);
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
      padding: 16px 18px;
    }

    .card-content h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-desc-preview {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px;
      justify-content: center;
    }

    .del-btn {
      padding: 7px 14px;
      background: none;
      border: 1.5px solid rgba(192,57,43,0.25);
      border-radius: 3px;
      color: var(--error);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .del-btn:hover { background: var(--error); color: white; border-color: var(--error); }

    .empty-admin {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-admin .icon { font-size: 2.5rem; margin-bottom: 12px; }

    .empty-admin h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--forest);
      margin-bottom: 6px;
    }

    .empty-admin p { font-size: 0.85rem; }

    @media (max-width: 900px) {
      .sidebar { width: 220px; }
      .main { margin-left: 220px; }
      .content { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .topbar { padding: 16px 20px; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div>
    <div class="sidebar-logo">Green<span>Realtors</span></div>
    <div class="sidebar-sub">Admin Panel</div>
  </div>

  <div class="sidebar-user">
    <div class="user-avatar" id="avatarInitial">A</div>
    <div class="user-info">
      <span id="usernameDisplay">Admin</span>
      <span>Staff Member</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <span class="nav-item active">
      <span class="icon">🏠</span> Manage Listings
    </span>
    <a href="index.html" class="nav-item">
      <span class="icon">👁️</span> View Public Site
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">
      <span>⬅</span> Sign Out
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h1>Property Management</h1>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">Total Listings</div>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- ADD FORM -->
    <div class="form-panel">
      <div class="panel-header">
        <h2>Add New Property</h2>
        <p>Fill in the details below to create a new listing</p>
      </div>
      <div class="panel-body">
        <div class="field">
          <label>Property Title</label>
          <input type="text" id="title" placeholder="e.g. Modern 3-Bed Apartment">
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="location" placeholder="e.g. Kigali, Rwanda">
        </div>
        <div class="field">
          <label>Price (USD)</label>
          <input type="number" id="price" placeholder="e.g. 250000">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="description" placeholder="Describe the property features, amenities, surroundings..."></textarea>
        </div>
        <button class="submit-btn" onclick="addProperty()">Add Property Listing</button>
      </div>
    </div>

    <!-- LISTINGS -->
    <div class="listings-panel">
      <div class="panel-header">
        <div>
          <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--cream)">Current Listings</h2>
          <p style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:4px">Manage your published properties</p>
        </div>
        <a href="index.html">View public site →</a>
      </div>
      <div class="property-list" id="adminList"></div>
    </div>
  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast">✅ Property added successfully!</div>

<script>
  // Auth guard
  if (sessionStorage.getItem('gr_staff_auth') !== 'true') {
    window.location.href = 'login.html';
  }

  // Set username
  const user = sessionStorage.getItem('gr_staff_user') || 'admin';
  document.getElementById('usernameDisplay').textContent = user.charAt(0).toUpperCase() + user.slice(1);
  document.getElementById('avatarInitial').textContent = user.charAt(0).toUpperCase();

  function getProperties() {
    return JSON.parse(localStorage.getItem('properties')) || [];
  }

  function saveProperties(list) {
    localStorage.setItem('properties', JSON.stringify(list));
  }

  function formatPrice(p) {
    return Number(p).toLocaleString('en-US');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function addProperty() {
    const title = document.getElementById('title').value.trim();
    const location = document.getElementById('location').value.trim();
    const price = document.getElementById('price').value.trim();
    const description = document.getElementById('description').value.trim();

    if (!title || !location || !price || !description) {
      showToast('⚠️ Please fill in all fields');
      return;
    }

    const list = getProperties();
    list.unshift({ title, location, price, description, id: Date.now() });
    saveProperties(list);

    // Clear form
    ['title', 'location', 'price', 'description'].forEach(id => document.getElementById(id).value = '');

    renderList();
    showToast('✅ Property added successfully!');
  }

  function deleteProperty(id) {
    if (!confirm('Remove this property listing?')) return;
    const list = getProperties().filter(p => (p.id || p.title) !== id);
    saveProperties(list);
    renderList();
    showToast('🗑️ Property removed');
  }

  function renderList() {
    const list = getProperties();
    const container = document.getElementById('adminList');
    document.getElementById('totalCount').textContent = list.length;

    if (list.length === 0) {
      container.innerHTML = `
        <div class="empty-admin">
          <div class="icon">🌿</div>
          <h3>No listings yet</h3>
          <p>Use the form on the left to add your first property.</p>
        </div>`;
      return;
    }

    container.innerHTML = list.map((p, i) => `
      <div class="admin-card">
        <div class="card-accent"></div>
        <div class="card-content">
          <h4>${p.title}</h4>
          <div class="card-meta">
            <span>📍 ${p.location}</span>
            <span>💰 $${formatPrice(p.price)}</span>
          </div>
          <p class="card-desc-preview">${p.description}</p>
        </div>
        <div class="card-actions">
          <button class="del-btn" onclick="deleteProperty(${p.id || JSON.stringify(p.title)})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function logout() {
    sessionStorage.removeItem('gr_staff_auth');
    sessionStorage.removeItem('gr_staff_user');
    window.location.href = 'login.html';
  }

  renderList();
</script>
</body>
</html>
